<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Workspace</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header with Logo and Version -->
      <div class="popup-header">
        <div class="logo-section">
          <img src="images/icon48.png" alt="AI Workspace Logo" class="logo" />
          <div class="header-text">
            <h1 class="app-name">AI Workspace</h1>
            <span class="version" id="version-display">v...</span>
          </div>
        </div>
      </div>

      <!-- Navigation Menu -->
      <div class="menu-section">
        <button class="menu-item" id="openManager">
          <span class="menu-icon">⚡</span>
          <span class="menu-text">Manager</span>
          <span class="menu-arrow">→</span>
        </button>

        <button class="menu-item" id="openSettings">
          <span class="menu-icon">⚙️</span>
          <span class="menu-text">Settings</span>
          <span class="menu-arrow">→</span>
        </button>

        <div class="menu-divider"></div>

        <a
          href="https://www.getaiworkspace.com/"
          target="_blank"
          class="menu-item menu-link"
        >
          <span class="menu-icon">🌐</span>
          <span class="menu-text">Website</span>
          <span class="menu-arrow">↗</span>
        </a>

        <a
          href="https://www.youtube.com/@ai-workspace-pro"
          target="_blank"
          class="menu-item menu-link"
        >
          <span class="menu-icon">📺</span>
          <span class="menu-text">YouTube</span>
          <span class="menu-arrow">↗</span>
        </a>

        <div class="menu-divider"></div>

        <a
          href="https://buymeacoffee.com/aiworkspace"
          target="_blank"
          class="menu-item menu-link menu-highlight"
        >
          <span class="menu-icon">☕</span>
          <span class="menu-text">Buy me a coffee</span>
          <span class="menu-arrow">↗</span>
        </a>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <p>Built with ❤️ for AI productivity</p>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
