<style>
  @import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');

  @keyframes blink {
    0% {
      opacity: 0.2;
    }

    20% {
      opacity: 1;
    }

    100% {
      opacity: 0.2;
    }
  }

  .saving span {
    font-size: 90px;
    animation-name: blink;
    animation-duration: 1.4s;
    animation-iteration-count: infinite;
    animation-fill-mode: both;
  }

  .saving span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .saving span:nth-child(3) {
    animation-delay: 0.4s;
  }

  .whom-container {
    margin: 0;
    padding: 0;
    font-family: 'Figtree', sans-serif;
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: white;
    flex-direction: column;
    align-items: center;
    z-index: 20000;
    display: flex;
  }

  .whom-content {
    flex: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .whom-footer {
    flex: 1;
    padding: 3vh;
  }
</style>
