<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Givee.Club</title>
    <link href="../vendor/bootstrap.css" rel="stylesheet" />
    <link href="./popup.css" rel="stylesheet" />
</head>
<body id="popup">
    <div id="events">
        <div class="loading">
            <img src="../images/loading.gif" width="128" height="15" />
        </div>
    </div>
    <script type="text/template" id="tmpl-events">
        <a href="https://givee.club/" target="_blank" class="btn btn-xs btn-primary hide" id="notifications"></a>
        <table class="table table-condensed">
            <thead>
                <tr>
                    <th class="type">${columnEventType}</th>
                    <th class="name">${columnEventName}</th>
                    <th class="action"></th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    </script>
    <script type="text/template" id="tmpl-event">
        <tr class="${class}">
            <td class="type">
                <i class="spritesheet event-type event-type-${type}">&nbsp;</i>
                <i class="spritesheet event-platform event-platform-${platform}">&nbsp;</i>
            </td>
            <td class="name">${name}</td>
            <td class="action"><a href="${url}" class="btn btn-info btn-xs" target="_blank">${linkGetIt}</a></td>
        </tr>
    </script>
    <script type="text/template" id="tmpl-events-empty">
        <tr>
            <td colspan="3" class="events-empty">${errorNoEvents}</td>
        </tr>
    </script>
    <script src="../vendor/jquery-3.6.3.min.js"></script>
    <script src="./popup.js"></script>
</body>
</html>
